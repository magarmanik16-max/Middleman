version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: timesglobal-cloud-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: timesglobal_cloud

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timesglobal-cloud-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/timesglobal_cloud?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your-production-jwt-secret}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASS=${GMAIL_PASS}
      - PROXMOX_API_URL=${PROXMOX_API_URL}
      - PROXMOX_API_TOKEN=${PROXMOX_API_TOKEN}
      - PROXMOX_API_SECRET=${PROXMOX_API_SECRET}
      - PROXMOX_SSH_HOST=${PROXMOX_SSH_HOST}
      - PROXMOX_SSH_USER=${PROXMOX_SSH_USER}
      - PROXMOX_SSH_PASSWORD=${PROXMOX_SSH_PASSWORD}
      - PROXMOX_SSH_KEY=${PROXMOX_SSH_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://localhost,https://192.168.55.155}
      - ALLOWED_EMAIL_DOMAIN=@timesglobal.com.np
    depends_on:
      - mongodb
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timesglobal-cloud-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_logs: